<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POH / HOODIE — swap</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg: #FAFAF7;
    --panel: #FFFFFF;
    --ink: #0A0A0A;
    --text: #14140F;
    --text-dim: #6B6B65;
    --hood: #CFEA1E;
    --hood-shadow: #A9C412;
    --burn: #FF5A36;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .wrap {
    width: 100%;
    max-width: 420px;
  }

  .hood-sig {
    display: flex;
    justify-content: center;
    margin-bottom: 6px;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-align: center;
  }

  .eyebrow .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--hood);
    border: 1.5px solid var(--ink);
  }

  h1 {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 4px;
    letter-spacing: -0.01em;
    text-align: center;
  }

  h1 .sep { color: var(--text-dim); font-weight: 400; margin: 0 6px; }

  .sub {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 20px;
    text-align: center;
  }

  .panel {
    background: var(--panel);
    border: 2.5px solid var(--ink);
    border-radius: 16px;
    padding: 20px;
    box-shadow: 5px 5px 0 var(--ink);
  }

  .burn-badge {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--hood);
    border: 2px solid var(--ink);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 20px;
  }

  .burn-badge-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .burn-badge-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink);
  }

  .field {
    margin-bottom: 14px;
  }

  .field-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .field-label .bal {
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
  }

  .field-label .bal:hover { color: var(--accent); }

  .input-row {
    display: flex;
    align-items: center;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
  }

  .input-row input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    width: 100%;
  }

  .input-row input::placeholder { color: #3A423F; }

  .token-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    padding: 4px 10px;
    background: rgba(74, 222, 222, 0.08);
    border-radius: 6px;
    white-space: nowrap;
    margin-left: 10px;
  }

  .flip {
    display: flex;
    justify-content: center;
    margin: -4px 0;
  }

  .flip button {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 30px;
    height: 30px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, border-color 0.15s;
  }

  .flip button:hover { color: var(--accent); border-color: var(--accent-dim); }

  .rate {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
    margin: 14px 0;
  }

  button.primary {
    width: 100%;
    background: var(--accent);
    color: #06110F;
    border: none;
    border-radius: 8px;
    padding: 14px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }

  button.primary:hover { opacity: 0.9; }
  button.primary:active { transform: scale(0.99); }

  button.primary:disabled {
    background: var(--border);
    color: var(--text-dim);
    cursor: not-allowed;
  }

  .status {
    margin-top: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
    min-height: 14px;
    word-break: break-all;
  }

  .status a { color: var(--accent); text-decoration: none; }
  .status a:hover { text-decoration: underline; }
  .status.error { color: var(--burn); }

  footer {
    margin-top: 20px;
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
  }

  footer a { color: var(--text-dim); }
  footer a:hover { color: var(--accent); }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="eyebrow"><span class="dot"></span>Robinhood Chain · mainnet</div>
  <h1>POH<span class="sep">⇄</span>HOODIE</h1>
  <div class="sub">Direct swap against the HoodiePair contract. No router, no listing — just the pool.</div>

  <div class="panel">
    <div class="burn-badge">
      <div class="burn-badge-label">🔥 LP burned to 0xdead</div>
      <div class="burn-badge-value" id="burnAmount">—</div>
    </div>

    <div class="field">
      <div class="field-label">
        <span>You pay</span>
        <span class="bal" id="balFrom">balance: —</span>
      </div>
      <div class="input-row">
        <input type="text" id="amountIn" placeholder="0.0" inputmode="decimal">
        <span class="token-tag" id="tagFrom">HOODIE</span>
      </div>
    </div>

    <div class="flip">
      <button id="flipBtn" title="Reverse direction" aria-label="Reverse swap direction">⇅</button>
    </div>

    <div class="field">
      <div class="field-label">
        <span>You receive (est.)</span>
        <span class="bal" id="balTo">balance: —</span>
      </div>
      <div class="input-row">
        <input type="text" id="amountOut" placeholder="0.0" readonly>
        <span class="token-tag" id="tagTo">POH</span>
      </div>
    </div>

    <div class="rate" id="rate">connect wallet to see rate</div>

    <button class="primary" id="actionBtn">Connect wallet</button>
    <div class="status" id="status"></div>
  </div>

  <footer>
    <span>pair: 0x57d4…9f1</span>
    <a href="https://robinhoodchain.blockscout.com/address/0x57d442079eb5b7be8c93e40ef4e86485f04ba9f1" target="_blank" rel="noopener">view on explorer →</a>
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script>
  // ---- config: real deployed addresses ----
  const PAIR_ADDRESS   = "0x57d442079eb5b7be8c93e40ef4e86485f04ba9f1";
  const HOODIE_ADDRESS = "0xC72c01AAB5f5678dc1d6f5C6d2B417d91D402Ba3";
  const POH_ADDRESS    = "0x3860d2aa1dbe1171b528da290d134df94f8d0115";
  const CHAIN_ID_HEX   = "0x1237"; // 4663
  const DEAD = "0x000000000000000000000000000000000000dead";

  const ERC20_ABI = [
    "function balanceOf(address) view returns (uint256)",
    "function decimals() view returns (uint8)",
    "function symbol() view returns (string)",
    "function approve(address,uint256) returns (bool)",
    "function allowance(address,address) view returns (uint256)"
  ];

  // Matches src/HoodiePair.sol exactly. Low-level UniV2-style pair:
  // caller must transfer the input token to the pair BEFORE calling swap().
  const PAIR_ABI = [
    "function getReserves() view returns (uint112 reserveHoodie, uint112 reserveToken)",
    "function hoodie() view returns (address)",
    "function token() view returns (address)",
    "function swap(uint256 amountHoodieOut, uint256 amountTokenOut, address to) external",
    "function balanceOf(address) view returns (uint256)"
  ];

  const FEE_NUMERATOR = 997;
  const FEE_DENOMINATOR = 1000;

  // Standard constant-product output formula, matching the 0.3% fee baked into HoodiePair.
  function getAmountOut(amountIn, reserveIn, reserveOut) {
    const amountInWithFee = amountIn.mul(FEE_NUMERATOR);
    const numerator = amountInWithFee.mul(reserveOut);
    const denominator = reserveIn.mul(FEE_DENOMINATOR).add(amountInWithFee);
    return numerator.div(denominator);
  }

  let provider, signer, userAddress;
  let direction = "hoodie-to-poh"; // or "poh-to-hoodie"

  const $ = (id) => document.getElementById(id);
  const statusEl = $("status");
  const actionBtn = $("actionBtn");

  function setStatus(msg, isError = false) {
    statusEl.innerHTML = msg;
    statusEl.className = "status" + (isError ? " error" : "");
  }

  function fmt(bn, decimals = 18, dp = 4) {
    if (!bn) return "0";
    return parseFloat(ethers.utils.formatUnits(bn, decimals)).toFixed(dp);
  }

  async function connect() {
    if (!window.ethereum) {
      setStatus("No wallet found. Install MetaMask or a compatible wallet.", true);
      return;
    }
    try {
      provider = new ethers.providers.Web3Provider(window.ethereum);
      await provider.send("eth_requestAccounts", []);

      const network = await provider.getNetwork();
      if (network.chainId !== 4663) {
        try {
          await window.ethereum.request({
            method: "wallet_switchEthereumChain",
            params: [{ chainId: CHAIN_ID_HEX }],
          });
        } catch (switchErr) {
          if (switchErr.code === 4902) {
            await window.ethereum.request({
              method: "wallet_addEthereumChain",
              params: [{
                chainId: CHAIN_ID_HEX,
                chainName: "Robinhood Chain",
                rpcUrls: ["https://rpc.mainnet.chain.robinhood.com"],
                blockExplorerUrls: ["https://robinhoodchain.blockscout.com"],
                nativeCurrency: { name: "ETH", symbol: "ETH", decimals: 18 }
              }]
            });
          } else {
            throw switchErr;
          }
        }
        provider = new ethers.providers.Web3Provider(window.ethereum);
      }

      signer = provider.getSigner();
      userAddress = await signer.getAddress();
      actionBtn.textContent = "Swap";
      setStatus("Connected: " + userAddress.slice(0, 6) + "…" + userAddress.slice(-4));
      await refreshAll();
    } catch (e) {
      setStatus(e.message || "Failed to connect", true);
    }
  }

  async function refreshAll() {
    if (!provider) return;
    try {
      const hoodie = new ethers.Contract(HOODIE_ADDRESS, ERC20_ABI, provider);
      const poh = new ethers.Contract(POH_ADDRESS, ERC20_ABI, provider);
      const pair = new ethers.Contract(PAIR_ADDRESS, PAIR_ABI, provider);

      const [hoodieBal, pohBal, pairBurned] = await Promise.all([
        userAddress ? hoodie.balanceOf(userAddress) : null,
        userAddress ? poh.balanceOf(userAddress) : null,
        pair.balanceOf(DEAD).catch(() => null),
      ]);

      const fromTag = direction === "hoodie-to-poh" ? "HOODIE" : "POH";
      const toTag = direction === "hoodie-to-poh" ? "POH" : "HOODIE";
      $("tagFrom").textContent = fromTag;
      $("tagTo").textContent = toTag;

      if (userAddress) {
        $("balFrom").textContent = "balance: " + fmt(direction === "hoodie-to-poh" ? hoodieBal : pohBal);
        $("balTo").textContent = "balance: " + fmt(direction === "hoodie-to-poh" ? pohBal : hoodieBal);
      }

      if (pairBurned) {
        $("burnAmount").textContent = fmt(pairBurned, 18, 2) + " LP";
      }

      const [r0, r1] = await pair.getReserves();
        if (r0.gt(0) && r1.gt(0)) {
          const rate = parseFloat(ethers.utils.formatUnits(r1, 18)) /
                       parseFloat(ethers.utils.formatUnits(r0, 18));
          $("rate").textContent = `1 HOODIE ≈ ${rate.toFixed(2)} POH`;
        }

    } catch (e) {
      console.error(e);
    }
  }

  $("flipBtn").addEventListener("click", () => {
    direction = direction === "hoodie-to-poh" ? "poh-to-hoodie" : "hoodie-to-poh";
    $("amountIn").value = "";
    $("amountOut").value = "";
    refreshAll();
  });

  actionBtn.addEventListener("click", async () => {
    if (!signer) return connect();

    const amountStr = $("amountIn").value;
    if (!amountStr || parseFloat(amountStr) <= 0) {
      setStatus("Enter an amount first.", true);
      return;
    }

    try {
      const inputIsHoodie = direction === "hoodie-to-poh";
      const inputAddr = inputIsHoodie ? HOODIE_ADDRESS : POH_ADDRESS;

      const pairRead = new ethers.Contract(PAIR_ADDRESS, PAIR_ABI, provider);
      const [reserveHoodie, reserveToken] = await pairRead.getReserves();
      const reserveIn = inputIsHoodie ? reserveHoodie : reserveToken;
      const reserveOut = inputIsHoodie ? reserveToken : reserveHoodie;

      const amountIn = ethers.utils.parseUnits(amountStr, 18);
      const rawOut = getAmountOut(amountIn, reserveIn, reserveOut);
      // 0.5% slippage buffer: transfer + swap are two separate txs on this
      // low-level pair, so reserves can move between them.
      const minOut = rawOut.mul(995).div(1000);
      $("amountOut").value = ethers.utils.formatUnits(rawOut, 18);

      actionBtn.disabled = true;

      setStatus("Step 1/2 — sending input token to the pair…");
      const inputToken = new ethers.Contract(inputAddr, ERC20_ABI, signer);
      const transferTx = await inputToken.transfer(PAIR_ADDRESS, amountIn);
      await transferTx.wait();

      setStatus("Step 2/2 — confirm the swap…");
      const pairWrite = new ethers.Contract(PAIR_ADDRESS, PAIR_ABI, signer);
      const hoodieOut = inputIsHoodie ? ethers.constants.Zero : minOut;
      const tokenOut = inputIsHoodie ? minOut : ethers.constants.Zero;
      const swapTx = await pairWrite.swap(hoodieOut, tokenOut, userAddress);
      const receipt = await swapTx.wait();

      setStatus(
        `Swapped. <a href="https://robinhoodchain.blockscout.com/tx/${receipt.transactionHash}" target="_blank" rel="noopener">view tx →</a>`
      );
      $("amountIn").value = "";
      $("amountOut").value = "";
      await refreshAll();
    } catch (e) {
      console.error(e);
      setStatus(e.reason || e.message || "Swap failed", true);
    } finally {
      actionBtn.disabled = false;
    }
  });

  window.addEventListener("load", () => {
    if (window.ethereum) {
      window.ethereum.on?.("accountsChanged", () => connect());
      window.ethereum.on?.("chainChanged", () => window.location.reload());
    }
  });
</script>
</body>
</html>
