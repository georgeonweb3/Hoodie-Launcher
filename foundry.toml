[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
robinhood_mainnet = "https://rpc.mainnet.chain.robinhood.com"
robinhood_testnet = "https://rpc.testnet.chain.robinhood.com"

[etherscan]
robinhood_mainnet = { key = "not-needed-for-blockscout", chain = 4663, url = "https://robinhoodchain.blockscout.com/api" }
robinhood_testnet = { key = "not-needed-for-blockscout", chain = 46630, url = "https://explorer.testnet.chain.robinhood.com/api" }
